[project]
name = "margoctl"
version = "0.1.0"
description = "Developer CLI for building and publishing Margo application packages"
requires-python = ">=3.12"
dependencies = [
    "typer>=0.15.4",
    "rich>=14.0.0",
    "dynaconf>=3.2.10",
    "oras>=0.2.28",
]

[project.scripts]
margoctl = "margoctl.main:app"

[dependency-groups]
dev = [
    "ruff>=0.11.0",
]

[tool.uv]
managed = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/margoctl"]

[tool.ruff]
target-version = "py312"
line-length = 130
lint.select = ["ALL"]
lint.ignore = ["D", "TD003", "FIX002"]
exclude = [".git", ".venv", "__pycache__"]
fix = true
